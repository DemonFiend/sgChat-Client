<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sgChat — Connect to Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1b1e;
      color: #e1e1e6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* Title bar drag region — native overlay provides window buttons */
    .titlebar {
      -webkit-app-region: drag;
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6e6e78;
    }

    /* Main content */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #5865f2;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #8e8e93;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .form {
      width: 100%;
      max-width: 400px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b5b5be;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #2b2d31;
      color: #e1e1e6;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.15s;
    }

    input:focus {
      box-shadow: 0 0 0 2px #5865f2;
    }

    input::placeholder {
      color: #5c5c66;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #5865f2;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: background 0.15s;
    }

    .btn:hover { background: #4752c4; }
    .btn:active { background: #3c45a5; }
    .btn:disabled { background: #4752c4; opacity: 0.6; cursor: not-allowed; }

    .error {
      color: #ed4245;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    .error.visible { display: block; }

    .status {
      color: #8e8e93;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    .status.visible { display: block; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">sgChat</span>
  </div>

  <div class="container">
    <div class="logo">sgChat</div>
    <p class="subtitle">Connect to your sgChat server</p>

    <div class="form">
      <label for="server-url">Server URL</label>
      <input
        type="url"
        id="server-url"
        placeholder="https://chat.example.com"
        autofocus
      >
      <p class="error" id="error"></p>
      <p class="status" id="status"></p>
      <button class="btn" id="connect-btn" onclick="handleConnect()">Connect</button>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('server-url');
    const errorEl = document.getElementById('error');
    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connect-btn');

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleConnect();
    });

    async function handleConnect() {
      const url = urlInput.value.trim().replace(/\/+$/, '');

      // Clear messages
      errorEl.classList.remove('visible');
      statusEl.classList.remove('visible');

      if (!url) {
        showError('Please enter a server URL.');
        return;
      }

      // Basic URL validation
      try {
        new URL(url);
      } catch {
        showError('Please enter a valid URL (e.g., https://chat.example.com).');
        return;
      }

      // Test connection
      connectBtn.disabled = true;
      showStatus('Connecting...');

      try {
        const response = await fetch(url + '/health', {
          method: 'GET',
          signal: AbortSignal.timeout(10000),
        });

        if (!response.ok) {
          throw new Error(`Server returned ${response.status}`);
        }

        const data = await response.json();

        if (!data.name && !data.status) {
          throw new Error('Not a valid sgChat server');
        }

        showStatus(`Connected to ${data.name || 'sgChat Server'}. Loading...`);

        // Save URL and navigate
        await electronAPI.connectToServer(url);
      } catch (err) {
        connectBtn.disabled = false;
        if (err.name === 'TimeoutError') {
          showError('Connection timed out. Check the URL and try again.');
        } else if (err.message.includes('fetch')) {
          showError('Could not reach server. Check the URL and your network.');
        } else {
          showError(err.message || 'Failed to connect to server.');
        }
      }
    }

    function showError(msg) {
      statusEl.classList.remove('visible');
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }

    function showStatus(msg) {
      errorEl.classList.remove('visible');
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
    }
  </script>
</body>
</html>
